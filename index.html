<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Palavras</title>
</head>
<body>
    <main>
        <div class="main-box">
            <div class="title-tips">
                <h1>Jogo das Palavras </h1>
                <p>Você será capaz de concluir o desafio?</p>
            </div>

            <div class="tips-box">
                <div class="tip">
                    <i></i><h1>Dica 1:</h1>
                    <p class="dica"></p>
                </div>

                <div class="tip">
                    <i></i><h1>Dica 2:</h1>
                     <p class="dica"></p>
                </div>

                <div class="tip">
                    <i></i><h1>Dica 3:</h1>
                     <p class="dica"></p>
                </div>

                <div class="tip">
                    <i></i><h1>Dica 4:</h1>
                     <p class="dica"></p>
                </div>

                <div class="tip">
                    <i></i><h1>Dica 5:</h1>
                     <p class="dica"></p>
                </div>
            </div>
            <div class="button-father">
                <button onclick="quiz()">Começar agora</button>
            </div>
        </div>
    </main>

    <script>const dicaCont = document.querySelectorAll('.dica');

const dicas =
    ["O GOAT do Basquete",
        "Maior Chutador da NBA",
        "Alien da NBA",
        "Willian da NBA",
        "Patrocinadora de uniformes da NBA"
    ];

const palavras = [
    "lebron james",
    "steph curry",
    "wembanyama",
    "trae young",
    "nike"
];

for (let i = 0; i < dicas.length; i++) {
    dicaCont[i].textContent = dicas[i];
}

function quiz() {
    let contador = 0
    alert('Vamos começar o quiz!!!')

    for (let i = 0; i < dicas.length; i++) {
        let acertou = false;

        while (!acertou) {
            let questao = prompt(dicas[i]);   

             if (questao.toLowerCase() === palavras[i].toLowerCase()) {
                alert('Acertou!');
                acertou = true;
            }
            else {
                alert('Errou');
                contador++;
                if (contador >= 3) {
                    acertou = true;
                    contador = 0;
                }             
            }

        }
        
       
      
    }

    
}</script>
</body>
</html>
